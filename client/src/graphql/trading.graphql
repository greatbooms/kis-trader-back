query GetAvailableStrategies {
  availableStrategies {
    name
    displayName
    description
    meta {
      riskLevel
      mddBuyBlock
      mddLiquidate
      expectedReturn
      maxLoss
      investmentPeriod
      tradingFrequency
      suitableFor
      tags
    }
  }
}

query GetMarketRegime($input: MarketRegimeFilterInput!) {
  marketRegime(input: $input) {
    regime
    market
    exchangeCode
  }
}

query GetRiskState($input: RiskStateFilterInput!) {
  riskState(input: $input) {
    buyBlocked
    liquidateAll
    positionCount
    investedRate
    dailyPnlRate
    drawdown
    reasons
  }
}


query GetAvailableStrategies {
  availableStrategies {
    name
    displayName
    description
    meta {
      riskLevel
      expectedReturn
      maxLoss
      investmentPeriod
      tradingFrequency
      suitableFor
      tags
    }
  }
}

query GetMarketRegime($market: Market!, $exchangeCode: String!) {
  marketRegime(market: $market, exchangeCode: $exchangeCode) {
    regime
    market
    exchangeCode
  }
}

query GetRiskState($market: Market!) {
  riskState(market: $market) {
    buyBlocked
    liquidateAll
    positionCount
    investedRate
    dailyPnlRate
    drawdown
    reasons
  }
}


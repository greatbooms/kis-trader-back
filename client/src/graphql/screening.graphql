query GetStockRecommendations($date: String, $market: String, $limit: Float) {
  stockRecommendations(date: $date, market: $market, limit: $limit) {
    id
    screeningDate
    market
    exchangeCode
    stockCode
    stockName
    totalScore
    technicalScore
    fundamentalScore
    momentumScore
    rank
    reasons
    indicators
    suggestedStrategies {
      name
      displayName
      matchScore
      reason
    }
    currentPrice
    changeRate
    volume
    marketCap
    createdAt
  }
}

query GetScreeningDates($limit: Float) {
  screeningDates(limit: $limit)
}

query GetScreeningSettings {
  screeningSettings {
    countries {
      country
      label
      enabled
    }
  }
}

mutation UpdateScreeningSettings($input: UpdateScreeningSettingsInput!) {
  updateScreeningSettings(input: $input) {
    countries {
      country
      label
      enabled
    }
  }
}

query GetTrades($input: TradeFilterInput) {
  trades(input: $input) {
    id
    market
    exchangeCode
    stockCode
    stockName
    side
    orderType
    quantity
    price
    executedPrice
    executedQty
    orderNo
    status
    strategyName
    reason
    createdAt
  }
}

query GetTrade($id: ID!) {
  trade(id: $id) {
    id
    market
    exchangeCode
    stockCode
    stockName
    side
    orderType
    quantity
    price
    executedPrice
    executedQty
    orderNo
    status
    strategyName
    reason
    createdAt
  }
}

query GetPositions($input: PositionsFilterInput) {
  positions(input: $input) {
    id
    market
    exchangeCode
    stockCode
    stockName
    quantity
    avgPrice
    currentPrice
    profitLoss
    profitRate
    totalInvested
  }
}

query GetQuote($stockCode: String!) {
  quote(stockCode: $stockCode) {
    stockCode
    stockName
    currentPrice
    openPrice
    highPrice
    lowPrice
    volume
  }
}

query GetOverseasQuote($input: OverseasQuoteInput!) {
  overseasQuote(input: $input) {
    stockCode
    stockName
    currentPrice
    openPrice
    highPrice
    lowPrice
    volume
  }
}

query GetAccountSummary {
  accountSummary {
    cashBalance
    totalInvested
    totalAssets
    totalProfitLoss
    profitRate
    positionCount
  }
}

query GetDashboardSummary {
  dashboardSummary {
    totalProfitLoss
    totalTradeCount
    todayTradeCount
    winRate
  }
}

mutation ManualSell($input: ManualSellInput!) {
  manualSell(input: $input) {
    success
    message
    orderNo
  }
}

